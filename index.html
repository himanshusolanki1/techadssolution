    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>No 1 Telegram Channel</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            width: 100%;
            overflow: hidden; /* Strict no-scroll constraint */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d1117; /* Dark fallback background behind the image */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Background setup with 40% transparency */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('background.png'); /* YOUR BACKGROUND IMAGE */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            opacity: 0.4; /* 40% opacity applied ONLY to the background */
            z-index: 1;
        }

        /* Main container layer above background */
        .container {
            position: relative;
            z-index: 2;
            width: 100%;
            max-width: 450px; /* Perfect for mobile viewports */
            padding: 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 85%; /* Distributed layout without crowding */
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            margin-bottom: 5px;
        }

        .header p {
            font-size: 16px;
            color: #8b949e;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .header .highlight-text {
            font-size: 18px;
            font-weight: 900;
            color: #ff9f43; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .logo-area {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-grow: 1;
        }

        .logo {
            width: 160px;
            height: 160px;
            object-fit: contain;
            filter: drop-shadow(0px 4px 20px rgba(0, 0, 0, 0.5));
        }

        .cta-area {
            margin-bottom: 20px;
        }

        .btn-tg {
            display: inline-block;
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #2481cc, #2aabee);
            color: #ffffff;
            text-decoration: none;
            font-size: 18px;
            font-weight: 700;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(42, 171, 238, 0.4);
            transition: transform 0.2s ease;
        }

        .btn-tg:active {
            transform: scale(0.98);
        }

        .redirect-text {
            font-size: 12px;
            color: #8b949e;
            margin-top: 15px;
            letter-spacing: 0.5px;
        }

        #countdown {
            font-weight: bold;
            color: #2aabee;
        }
    </style>

<body>

    <div class="bg-overlay"></div>

    <div class="container">
        
        <div class="header">
            <h1>No 1 Telegram Channel</h1>
            <p>Check yourself</p>
            <div class="highlight-text">4 SESSION DAILY</div>
        </div>

        <div class="logo-area">
            <img src="wolf.png" alt="Wolf Trader Logo" class="logo">
        </div>

        <div class="cta-area">
            <a href="https://t.me/+L-RkZVZIYcZhNzM1" class="btn-tg">Join Free Telegram</a>
            <div class="redirect-text">Redirecting automatically in <span id="countdown">250</span>s...</div>
        </div>

    </div>

    <script>
        const targetUrl = "https://t.me/+L-RkZVZIYcZhNzM1";
        let timeLeft = 10;
        const countdownEl = document.getElementById("countdown");

        const downloadTimer = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;
            if (timeLeft <= 0) {
                clearInterval(downloadTimer);
                window.location.href = targetUrl;
            }
        }, 1000);
    </script>

</body>
</html>
