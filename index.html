    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            width: 100%;
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #08090a;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Container designed to fit 100% height single page on mobile */
        .page-wrapper {
            width: 100%;
            max-width: 430px;
            min-height: 100vh;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at top center, #151d2a 0%, #08090a 70%);
        }

        /* Header Section */
        .header {
            margin-top: 10px;
            margin-bottom: 15px;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            line-height: 1.3;
            color: #ffffff;
            letter-spacing: -0.3px;
        }

        .highlight-wrapper {
            position: relative;
            display: inline-block;
            color: #ffcc00;
        }

        /* Curved Line SVG Styling */
        .curved-line {
            position: absolute;
            bottom: -12px;
            left: 0;
            width: 100%;
            height: 14px;
            overflow: visible;
        }

        /* Profile & Brand Section */
        .profile-area {
            margin: 15px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-glow {
            position: relative;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            padding: 4px;
            background: linear-gradient(135deg, #2bc5d3 0%, #2aabee 100%);
            box-shadow: 0 0 25px rgba(43, 197, 211, 0.35);
            margin-bottom: 12px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            background-color: #111;
            display: block;
        }

        .brand-name {
            font-size: 20px;
            font-weight: 900;
            color: #2bc5d3;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* Features List Container */
        .features-card {
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 18px 16px;
            margin-bottom: 20px;
            text-align: left;
        }

        .feature-item {
            font-size: 15px;
            font-weight: 600;
            line-height: 1.4;
            color: #f0f0f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .feature-item:not(:last-child) {
            margin-bottom: 14px;
        }

        .feature-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .feature-subtext {
            display: block;
            font-weight: 400;
            font-size: 13px;
            color: #a0a6b1;
        }

        /* CTA Section & Zoom Animation */
        .cta-area {
            width: 100%;
            margin-bottom: 10px;
        }

        /* Zoom In / Zoom Out Continuous Loop Animation */
        @keyframes zoomLoop {
            0% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(42, 171, 238, 0.4);
            }
            50% {
                transform: scale(1.05);
                box-shadow: 0 8px 30px rgba(42, 171, 238, 0.8);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 4px 15px rgba(42, 171, 238, 0.4);
            }
        }

        .btn-tg {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 16px 20px;
            background: linear-gradient(135deg, #2aabee 0%, #0088cc 100%);
            color: #ffffff;
            text-decoration: none;
            font-size: 17px;
            font-weight: 800;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            animation: zoomLoop 2s infinite ease-in-out;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-tg svg {
            width: 24px;
            height: 24px;
            fill: #ffffff;
            flex-shrink: 0;
        }

        .cta-posttext {
            font-size: 13px;
            font-weight: 600;
            color: #a0a6b1;
            margin-top: 10px;
            letter-spacing: 0.3px;
        }

        /* Responsive Small Screen Tweaks */
        @media (max-height: 670px) {
            .page-wrapper {
                padding: 15px;
            }
            .header h1 {
                font-size: 22px;
            }
            .avatar-glow {
                width: 110px;
                height: 110px;
            }
            .features-card {
                padding: 14px;
                margin-bottom: 15px;
            }
            .feature-item {
                font-size: 14px;
            }
            .btn-tg {
                padding: 14px 16px;
                font-size: 15px;
            }
        }
    </style>
</head>
